# Spring Boot Application Properties
spring.application.name=library-backend

# Server Configuration
server.port=${PORT:8080}

# Database — set via environment variables in production (see .env.example)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-divine-frost-ahg7cj8s-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&socketTimeout=30&connectTimeout=10}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - Tuned for Neon Serverless
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# JWT / Token Security
app.token.secret=${APP_TOKEN_SECRET:}

# Six-digit PIN required for admin fee access and admin password changes
app.admin.pin=${APP_ADMIN_PIN:560059}

# CORS — comma-separated origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# JPA and Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# WhatsApp Business API (see .env.example)
app.whatsapp.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
app.whatsapp.api-version=${WHATSAPP_API_VERSION:v21.0}
app.whatsapp.base-url=${WHATSAPP_BASE_URL:https://graph.facebook.com}
app.whatsapp.rate-limit-per-second=${WHATSAPP_RATE_LIMIT_PER_SECOND:80}
app.whatsapp.rate-limit-per-day=${WHATSAPP_RATE_LIMIT_PER_DAY:10000}
app.whatsapp.monthly-collection-recipients=${WHATSAPP_MONTHLY_COLLECTION_RECIPIENTS:}
app.whatsapp.queue-retention-days=${WHATSAPP_QUEUE_RETENTION_DAYS:10}

# Production error responses — do not leak stack traces
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
